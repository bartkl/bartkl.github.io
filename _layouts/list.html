---
layout: default
---

<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>

<h1>{{ page.title }}</h1>

<section id="list">
  {% for album in page.list %}
  <div>
    <span>{{ page.data[album.id].title }}</span>
    <span>{{ page.data[album.id].year}}</span>
    <span>{{ page.data[album.id].genre }}</span>
    <div>{{ album.rating }}</div>
    <div>{{ album.description }}</div>
  </div>
  {% endfor %}
</section>
