---
layout: default
---

<h1>{{ page.title }}</h1>

<div class="container-md">
  <section id="resource-list">
    {% for category in page.list %}
    <div class="row pt-3">
      <h2>{{ category.category }}</h2>
      {% for resource in category.items %}
          <div class="col">
            {{ resource.title }}
          </div>
          <div class="col">
            {{ resource.title }}
          </div>
      {% endfor %}
    </div>
    {% endfor %}
  </section>
</div>
