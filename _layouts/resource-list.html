---
layout: default
---

<style type="text/css">
  h5 {
    font-weight: 700;
  }
</style>

<h1>{{ page.title }}</h1>

<div class="container-md">
  <section id="resource-list">
    {% for category in page.list %}
    <div class="row pt-3">
      <h3>{{ category.category }}</h3>
      {% for resource in category.items %}
        <div class="col">
          <h5>{{ resource.title }}</h5>
          <div>
            <span class="author">{{ resource.author }}</span> &mdash; <span class="date">{{ resource.date }}</span>
          </div>
          <div><a href="{{ resource.link }}">{{ resource.link }}</a></div>
          <div>Tags: {{ resource.tags }}</div>
        </div>
      {% endfor %}
    </div>
    {% endfor %}
  </section>
</div>
