---
layout: default
---

<h1>{{ page.title }}</h1>

<div class="container-md">
  <section id="resource-list">
      {{ page.list | inspect }}
    {% for category in page.list %}
      {{ category | inspect }}
    <div class="row pt-3">
      <h2>{{ category.title }}</h2>
      {% for resource in category %}
          <div class="col">
            {{ resource.title }}
          </div>
          <div class="col">
            {{ resource.title }}
          </div>
      {% endfor %}
    </div>
    {% endfor %}
  </section>
</div>
